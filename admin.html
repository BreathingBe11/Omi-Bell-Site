<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal Admin — Omi Bell</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --black: #0A0A0A; --white: #F9F7F4; --teal: #007B8F; --teal-light: #0CB6D4;
  --sand: #E8E0D4; --sand-dark: #C9BDB0;
  --bg: #F9F7F4; --surface: #FFFFFF; --border: #E8E0D4;
  --text: #0A0A0A; --muted: rgba(10,10,10,0.45); --danger: #c0392b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* LOGIN */
#loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 2rem; padding: 2rem; }
.login-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; letter-spacing: 0.1em; }
.login-card { background: var(--surface); border: 1px solid var(--border); padding: 2.5rem 3rem; width: 100%; max-width: 380px; }
.login-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--teal); display: block; margin-bottom: 1.2rem; text-align: center; }
.login-input { width: 100%; padding: 0.8rem 1rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; margin-bottom: 1rem; outline: none; transition: border-color 0.2s; box-shadow: inset 0 1px 3px rgba(0,0,0,0.04); }
.login-input:focus { border-color: var(--teal); }
.login-input::placeholder { color: var(--muted); }
.login-btn { width: 100%; padding: 0.8rem; background: var(--teal); color: var(--white); border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase; transition: background 0.2s; }
.login-btn:hover { background: var(--teal-light); }
.login-error { color: #e74c3c; font-size: 0.82rem; margin-top: 0.6rem; text-align: center; display: none; }

/* SHELL */
#adminShell { display: none; min-height: 100vh; }
.admin-top { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
.admin-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; letter-spacing: 0.08em; }
.admin-brand span { color: var(--teal); }
.top-actions { display: flex; gap: 0.8rem; align-items: center; }
.btn-sm { padding: 0.45rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.2s; }
.btn-teal { background: var(--teal); color: var(--white); }
.btn-teal:hover { background: var(--teal-light); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border) !important; }
.btn-ghost:hover { color: var(--text); }
.view-link { color: var(--muted); font-size: 0.72rem; text-decoration: none; }
.view-link:hover { color: var(--teal-light); }

.admin-body { display: flex; min-height: calc(100vh - 54px); }

/* POSTS LIST */
.posts-panel { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; max-height: calc(100vh - 54px); position: sticky; top: 54px; }
.panel-head { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.post-item { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; display: flex; align-items: flex-start; justify-content: space-between; gap: 0.8rem; }
.post-item:hover { background: rgba(255,255,255,0.03); }
.post-item.selected { background: rgba(0,123,143,0.1); border-left: 2px solid var(--teal); padding-left: calc(1.5rem - 2px); }
.post-item-title { font-size: 0.88rem; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.25rem; }
.post-item-date { font-size: 0.68rem; color: var(--muted); }
.status { display: inline-block; padding: 0.15rem 0.5rem; font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; flex-shrink: 0; margin-top: 0.1rem; }
.status-live { background: rgba(0,123,143,0.2); color: var(--teal-light); }
.status-draft { background: rgba(232,224,212,0.08); color: var(--muted); }
.posts-empty { padding: 2rem 1.5rem; text-align: center; font-size: 0.82rem; color: var(--muted); font-style: italic; }

/* EDITOR */
.editor-panel { flex: 1; overflow-y: auto; padding: 2rem 2.5rem; max-height: calc(100vh - 54px); }
.editor-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; color: var(--muted); }
.editor-welcome h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; margin-bottom: 0.5rem; color: var(--text); }

.field-group { margin-bottom: 1.5rem; }
.field-label { display: block; font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
.field-input { width: 100%; padding: 0.7rem 0.9rem; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.92rem; outline: none; transition: border-color 0.2s; resize: vertical; }
.field-input:focus { border-color: var(--teal); }
.field-input::placeholder { color: var(--muted); }
.title-input { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

/* IMAGE */
.img-preview { height: 130px; background: var(--bg); border: 1px dashed var(--sand-dark); display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 0.6rem; }
.img-preview img { width: 100%; height: 100%; object-fit: cover; }
.img-preview-empty { font-size: 0.75rem; color: var(--muted); }
.img-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.4rem; }
.img-btn { padding: 0.35rem 0.8rem; background: transparent; color: var(--teal); border: 1px solid var(--teal); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.img-btn:hover { background: var(--teal); color: var(--white); }
.img-btn-muted { color: var(--muted); border-color: var(--border); }
.img-btn-muted:hover { background: transparent; color: var(--text); border-color: rgba(232,224,212,0.3); }
.img-note { font-size: 0.65rem; color: var(--muted); }

/* RICH TEXT */
.rte-wrap { border: 1px solid var(--border); }
.rte-toolbar { display: flex; flex-wrap: wrap; gap: 2px; padding: 0.5rem; border-bottom: 1px solid var(--border); background: #F0EBE4; }
.rte-btn { padding: 0.28rem 0.5rem; min-width: 30px; height: 28px; background: transparent; border: none; color: var(--black); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
.rte-btn:hover { background: rgba(0,123,143,0.1); }
.rte-btn.on { background: var(--teal); color: var(--white); }
.rte-sep { width: 1px; background: var(--border); margin: 0 3px; height: 26px; align-self: center; }
.rte-select { height: 28px; padding: 0 0.4rem; background: #FFFFFF; border: 1px solid var(--border); color: var(--black); font-family: 'DM Sans', sans-serif; font-size: 0.76rem; cursor: pointer; outline: none; }
.rte-color-wrap { width: 30px; height: 28px; border: 1px solid var(--border); position: relative; overflow: hidden; cursor: pointer; }
.rte-color-swatch { width: 100%; height: 100%; pointer-events: none; background: #e8e0d4; }
.rte-color-wrap input[type="color"] { position: absolute; top: -4px; left: -4px; width: calc(100% + 8px); height: calc(100% + 8px); border: none; opacity: 0; cursor: pointer; }
.rte-editor { min-height: 300px; padding: 1.2rem; outline: none; line-height: 1.75; color: var(--black); font-size: 0.95rem; background: #FFFFFF; }
.rte-editor:empty::before { content: attr(data-placeholder); color: var(--muted); pointer-events: none; }
.rte-editor h2,.rte-editor h3 { font-family: 'Cormorant Garamond', serif; font-weight: 400; margin: 1rem 0 0.5rem; }
.rte-editor ul,.rte-editor ol { margin-left: 1.5rem; }
.rte-editor blockquote { border-left: 3px solid var(--teal); padding-left: 1rem; color: var(--muted); font-style: italic; margin: 1rem 0; }

/* ACTIONS */
.editor-actions { display: flex; align-items: center; gap: 1rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); flex-wrap: wrap; }
.btn-publish { padding: 0.7rem 1.8rem; background: var(--teal); color: var(--white); border: none; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
.btn-publish:hover { background: var(--teal-light); }
.btn-draft { padding: 0.7rem 1.8rem; background: transparent; color: var(--text); border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.btn-draft:hover { border-color: var(--text); }
.btn-delete { padding: 0.7rem 1rem; background: transparent; color: var(--danger); border: 1px solid transparent; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-left: auto; transition: all 0.2s; }
.btn-delete:hover { border-color: var(--danger); }

/* TOAST */
#toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 1000; padding: 0.8rem 1.5rem; background: var(--teal); color: var(--white); font-size: 0.82rem; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
#toast.show { transform: translateY(0); opacity: 1; }
#toast.err { background: var(--danger); }

@media(max-width:768px){
  .admin-body{flex-direction:column} .posts-panel{width:100%;max-height:40vh;position:static}
  .editor-panel{padding:1.5rem} .field-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">Omi Bell</div>
  <div class="login-card">
    <span class="login-label">Journal Admin</span>
    <input type="password" id="pwInput" class="login-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Enter</button>
    <p class="login-error" id="loginErr">Incorrect password.</p>
  </div>
</div>

<div id="adminShell">
  <div class="admin-top">
    <div class="admin-brand">Omi Bell · <span>Journal</span></div>
    <div class="top-actions">
      <a href="blog.html" target="_blank" class="view-link">View Blog ↗</a>
      <button class="btn-sm btn-teal" onclick="newPost()">+ New Post</button>
      <button class="btn-sm btn-ghost" onclick="logout()">Log Out</button>
    </div>
  </div>

  <div class="admin-body">
    <div class="posts-panel">
      <div class="panel-head">
        <span class="panel-title">All Posts</span>
        <span id="postCount" style="font-size:0.68rem;color:var(--muted);">—</span>
      </div>
      <div id="postList"></div>
    </div>

    <div class="editor-panel" id="editorPanel">
      <div class="editor-welcome" id="editorWelcome">
        <h3>Your Journal</h3>
        <p>Select a post to edit, or create a new one.</p>
      </div>

      <div id="editorForm" style="display:none;">
        <div class="field-group">
          <label class="field-label">Title</label>
          <input type="text" id="fTitle" class="field-input title-input" placeholder="Write your title here…">
        </div>
        <div class="field-group">
          <label class="field-label">Excerpt</label>
          <textarea id="fExcerpt" class="field-input" rows="2" placeholder="Short description shown on the blog listing…"></textarea>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Category</label>
            <input type="text" id="fCategory" class="field-input" placeholder="e.g. Wellness, Rest, Leadership…">
          </div>
          <div class="field-group">
            <label class="field-label">Read Time (min)</label>
            <input type="number" id="fReadTime" class="field-input" placeholder="5" min="1">
          </div>
        </div>

        <!-- COVER IMAGE -->
        <div class="field-group">
          <label class="field-label">Cover Image</label>
          <div class="img-preview" id="imgPreview"><div class="img-preview-empty">No image selected</div></div>
          <div class="img-actions">
            <label class="img-btn" for="imgFile">↑ Upload</label>
            <input type="file" id="imgFile" style="display:none" accept="image/*" onchange="handleImg(event)">
            <button class="img-btn" onclick="pasteUrl()">Paste URL</button>
            <button class="img-btn img-btn-muted" onclick="clearImg()">Remove</button>
          </div>
          <p class="img-note">Keep under 1MB for uploads. For larger images, use a URL from Cloudinary or any image host.</p>
          <input type="hidden" id="fCoverImage">
        </div>

        <!-- RICH TEXT EDITOR -->
        <div class="field-group">
          <label class="field-label">Article Content</label>
          <div class="rte-wrap">
            <div class="rte-toolbar">
              <select class="rte-select" onchange="cmd('fontName',this.value);this.blur()" title="Font">
                <option value="'DM Sans',sans-serif">DM Sans</option>
                <option value="'Cormorant Garamond',serif">Garamond</option>
                <option value="Georgia,serif">Georgia</option>
                <option value="'Times New Roman',serif">Times New Roman</option>
                <option value="'Courier New',monospace">Courier</option>
              </select>
              <select class="rte-select" onchange="setSize(this.value);this.blur()" title="Size">
                <option value="">Size</option>
                <option value="small">Small</option>
                <option value="normal">Normal</option>
                <option value="large">Large</option>
                <option value="huge">Huge</option>
              </select>
              <div class="rte-sep"></div>
              <button class="rte-btn" id="btnBold" onclick="cmd('bold')" title="Bold"><strong>B</strong></button>
              <button class="rte-btn" id="btnItalic" onclick="cmd('italic')" title="Italic"><em>I</em></button>
              <button class="rte-btn" id="btnUnder" onclick="cmd('underline')" title="Underline"><u>U</u></button>
              <div class="rte-sep"></div>
              <div class="rte-color-wrap" title="Text color">
                <div class="rte-color-swatch" id="colorSwatch"></div>
                <input type="color" value="#e8e0d4" oninput="cmd('foreColor',this.value);document.getElementById('colorSwatch').style.background=this.value">
              </div>
              <div class="rte-sep"></div>
              <button class="rte-btn" onclick="cmd('justifyLeft')" title="Left">≡</button>
              <button class="rte-btn" onclick="cmd('justifyCenter')" title="Center">≡</button>
              <button class="rte-btn" onclick="cmd('justifyRight')" title="Right">≡</button>
              <div class="rte-sep"></div>
              <button class="rte-btn" onclick="cmd('insertUnorderedList')" title="Bullets">• —</button>
              <button class="rte-btn" onclick="cmd('insertOrderedList')" title="Numbers">1. —</button>
              <div class="rte-sep"></div>
              <button class="rte-btn" onclick="cmd('formatBlock','h2')" title="Heading">H2</button>
              <button class="rte-btn" onclick="cmd('formatBlock','h3')" title="Subheading">H3</button>
              <button class="rte-btn" onclick="cmd('formatBlock','blockquote')" title="Quote">"</button>
              <button class="rte-btn" onclick="cmd('formatBlock','p')" title="Normal">¶</button>
              <button class="rte-btn" onclick="cmd('insertHorizontalRule')" title="Divider">—</button>
            </div>
            <div class="rte-editor" id="rteEditor" contenteditable="true" data-placeholder="Start writing your article here…" onmouseup="syncToolbar()" onkeyup="syncToolbar()"></div>
          </div>
        </div>

        <div class="editor-actions">
          <button class="btn-publish" onclick="savePost(true)">Publish</button>
          <button class="btn-draft" onclick="savePost(false)">Save Draft</button>
          <button class="btn-delete" id="btnDelete" style="display:none" onclick="deletePost()">Delete Post</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const ADMIN_PASSWORD = 'omibell2025'; // ← change this!
const db = supabase.createClient(
  'https://mfevhwdtpftmlsksrgdi.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mZXZod2R0cGZ0bWxza3NyZ2RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzg1MTQsImV4cCI6MjA5MTg1NDUxNH0.tjWrwpoL24y2WhlkexWLHxYeHw_Yu9qfHM4Qj1VE6XA'
);
// ─────────────────────────────────────────────────────────

let posts = [];
let currentId = null;

// AUTH
window.onload = () => { if (sessionStorage.getItem('ob_auth') === 'yes') showAdmin(); };
function login() {
  if (document.getElementById('pwInput').value === ADMIN_PASSWORD) {
    sessionStorage.setItem('ob_auth', 'yes');
    document.getElementById('loginErr').style.display = 'none';
    showAdmin();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
function logout() { sessionStorage.removeItem('ob_auth'); location.reload(); }

async function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminShell').style.display = 'block';
  loadList();
}

// POST LIST
async function loadList() {
  const el = document.getElementById('postList');
  el.innerHTML = '<div class="posts-empty">Loading…</div>';
  const { data, error } = await db.from('posts').select('id,title,date,published').order('date', { ascending: false });
  if (error) { el.innerHTML = `<div class="posts-empty">${error.message}</div>`; return; }
  posts = data || [];
  document.getElementById('postCount').textContent = posts.length;
  if (!posts.length) { el.innerHTML = '<div class="posts-empty">No posts yet.</div>'; return; }
  el.innerHTML = '';
  posts.forEach(p => {
    const d = document.createElement('div');
    d.className = 'post-item' + (p.id === currentId ? ' selected' : '');
    d.dataset.id = p.id;
    d.onclick = () => openPost(p.id);
    d.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="post-item-title">${p.title || '(Untitled)'}</div>
        <div class="post-item-date">${fmtDate(p.date)}</div>
      </div>
      <span class="status ${p.published ? 'status-live' : 'status-draft'}">${p.published ? 'Live' : 'Draft'}</span>`;
    el.appendChild(d);
  });
}

// NEW / OPEN
function newPost() {
  currentId = null;
  showForm();
  document.getElementById('btnDelete').style.display = 'none';
  clearForm();
  document.getElementById('fTitle').focus();
  document.querySelectorAll('.post-item').forEach(e => e.classList.remove('selected'));
}

async function openPost(id) {
  const { data, error } = await db.from('posts').select('*').eq('id', id).single();
  if (error || !data) { toast('Could not load post.', true); return; }
  currentId = id;
  showForm();
  document.getElementById('btnDelete').style.display = 'inline-block';
  document.getElementById('fTitle').value = data.title || '';
  document.getElementById('fExcerpt').value = data.excerpt || '';
  document.getElementById('fCategory').value = data.category || '';
  document.getElementById('fReadTime').value = data.read_time || '';
  document.getElementById('fCoverImage').value = data.cover_image || '';
  document.getElementById('rteEditor').innerHTML = data.content || '';
  setImgPreview(data.cover_image || '');
  document.querySelectorAll('.post-item').forEach(e => e.classList.toggle('selected', e.dataset.id === id));
  document.getElementById('editorPanel').scrollTop = 0;
}

function showForm() {
  document.getElementById('editorWelcome').style.display = 'none';
  document.getElementById('editorForm').style.display = 'block';
}
function clearForm() {
  ['fTitle','fExcerpt','fCategory','fReadTime','fCoverImage'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('rteEditor').innerHTML = '';
  setImgPreview('');
}

// SAVE / DELETE
async function savePost(publish) {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { toast('Please enter a title.', true); return; }
  const payload = {
    title,
    excerpt: document.getElementById('fExcerpt').value.trim(),
    category: document.getElementById('fCategory').value.trim(),
    read_time: parseInt(document.getElementById('fReadTime').value) || null,
    cover_image: document.getElementById('fCoverImage').value || null,
    content: document.getElementById('rteEditor').innerHTML,
    published: publish,
    updated_at: new Date().toISOString()
  };
  let error;
  if (currentId) {
    ({ error } = await db.from('posts').update(payload).eq('id', currentId));
  } else {
    payload.date = new Date().toISOString();
    const res = await db.from('posts').insert(payload).select('id').single();
    error = res.error;
    if (!error) currentId = res.data.id;
  }
  if (error) { toast('Error: ' + error.message, true); return; }
  toast(publish ? 'Published!' : 'Saved as draft.');
  loadList();
}

async function deletePost() {
  if (!currentId || !confirm('Delete this post permanently?')) return;
  const { error } = await db.from('posts').delete().eq('id', currentId);
  if (error) { toast('Error: ' + error.message, true); return; }
  currentId = null;
  document.getElementById('editorForm').style.display = 'none';
  document.getElementById('editorWelcome').style.display = 'flex';
  toast('Post deleted.');
  loadList();
}

// IMAGE
function handleImg(e) {
  const file = e.target.files[0]; if (!file) return;
  if (file.size > 1.2 * 1024 * 1024) { toast('Image over 1MB — please use a URL instead.', true); e.target.value = ''; return; }
  const r = new FileReader();
  r.onload = ev => { document.getElementById('fCoverImage').value = ev.target.result; setImgPreview(ev.target.result); };
  r.readAsDataURL(file);
}
function pasteUrl() {
  const url = prompt('Paste image URL:');
  if (url && url.startsWith('http')) { document.getElementById('fCoverImage').value = url; setImgPreview(url); }
}
function clearImg() { document.getElementById('fCoverImage').value = ''; setImgPreview(''); document.getElementById('imgFile').value = ''; }
function setImgPreview(src) {
  document.getElementById('imgPreview').innerHTML = src
    ? `<img src="${src}" onerror="this.parentElement.innerHTML='<div class=img-preview-empty>Could not load</div>'">`
    : '<div class="img-preview-empty">No image selected</div>';
}

// RICH TEXT
function cmd(c, v = null) { document.getElementById('rteEditor').focus(); document.execCommand(c, false, v); syncToolbar(); }
function setSize(s) {
  if (!s) return;
  const px = { small:'14px', normal:'16px', large:'22px', huge:'32px' }[s];
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const span = document.createElement('span');
  span.style.fontSize = px;
  try { range.surroundContents(span); } catch(e) {}
}
function syncToolbar() {
  document.getElementById('btnBold').classList.toggle('on', document.queryCommandState('bold'));
  document.getElementById('btnItalic').classList.toggle('on', document.queryCommandState('italic'));
  document.getElementById('btnUnder').classList.toggle('on', document.queryCommandState('underline'));
}

// UTILS
function fmtDate(s) { return s ? new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'; }
let toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}
