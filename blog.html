<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Journal — Omi Bell</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --black: #0A0A0A;
  --white: #F9F7F4;
  --teal: #007B8F;
  --teal-light: #0CB6D4;
  --sand: #E8E0D4;
  --sand-dark: #C9BDB0;
  --card-bg: #FFFFFF;
  --text-muted: rgba(10,10,10,0.5);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--black); -webkit-font-smoothing: antialiased; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 3rem;
  background: transparent;
  transition: background 0.4s, box-shadow 0.4s;
}
nav.scrolled { background: rgba(249,247,244,0.96); box-shadow: 0 1px 0 var(--sand); backdrop-filter: blur(8px); }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; letter-spacing: 0.05em; color: var(--black); text-decoration: none; }
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a { font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--black); text-decoration: none; font-weight: 400; transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--teal); }
.nav-cta { background: var(--teal); color: var(--white) !important; padding: 0.5rem 1.2rem; transition: background 0.2s !important; }
.nav-cta:hover { background: var(--teal-light) !important; }

.journal-header { padding: 9rem 3rem 3rem; border-bottom: 1px solid var(--sand); display: flex; align-items: flex-end; justify-content: space-between; }
.journal-eyebrow { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.6rem; }
.journal-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.8rem, 5vw, 4.5rem); font-weight: 300; line-height: 1.05; }
.journal-title em { font-style: italic; }
.journal-rule { width: 60px; height: 1px; background: var(--teal); margin-top: 1.5rem; }
.journal-tagline { font-size: 0.9rem; color: var(--text-muted); max-width: 280px; text-align: right; line-height: 1.6; }

.blog-main { padding: 3rem; max-width: 1400px; margin: 0 auto; }
.blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 3rem; }

.card-featured {
  grid-column: 1 / -1; display: grid; grid-template-columns: 1.3fr 1fr;
  background: var(--card-bg); border: 1px solid var(--sand);
  cursor: pointer; transition: box-shadow 0.3s, transform 0.3s;
  text-decoration: none; color: inherit; min-height: 380px;
}
.card-featured:hover { box-shadow: 0 12px 40px rgba(10,10,10,0.1); transform: translateY(-2px); }
.card-featured .card-img { overflow: hidden; }
.card-featured .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
.card-featured:hover .card-img img { transform: scale(1.03); }
.card-featured .card-body { padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; position: relative; }
.card-featured .card-body::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 60px; background: var(--teal); }

.card-regular {
  background: var(--card-bg); border: 1px solid var(--sand);
  cursor: pointer; transition: box-shadow 0.3s, transform 0.3s;
  text-decoration: none; color: inherit; display: flex; flex-direction: column;
}
.card-regular:hover { box-shadow: 0 8px 28px rgba(10,10,10,0.09); transform: translateY(-2px); }
.card-regular .card-img { overflow: hidden; aspect-ratio: 16/9; }
.card-regular .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
.card-regular:hover .card-img img { transform: scale(1.04); }
.card-regular .card-body { padding: 1.5rem 1.5rem 1.8rem; flex: 1; display: flex; flex-direction: column; border-top: 2px solid var(--teal); }

.card-category { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.6rem; font-weight: 500; }
.card-title { font-family: 'Cormorant Garamond', serif; font-weight: 400; line-height: 1.2; margin-bottom: 0.8rem; }
.card-featured .card-title { font-size: clamp(1.6rem, 2.5vw, 2.2rem); }
.card-regular .card-title { font-size: 1.3rem; }
.card-excerpt { font-size: 0.87rem; color: var(--text-muted); line-height: 1.65; flex: 1; }
.card-featured .card-excerpt { font-size: 0.95rem; max-width: 420px; }
.card-meta { display: flex; align-items: center; gap: 0.6rem; margin-top: 1.5rem; font-size: 0.72rem; letter-spacing: 0.06em; color: var(--sand-dark); }
.card-meta::before { content: ''; display: block; width: 20px; height: 1px; background: var(--sand-dark); }
.card-img-placeholder { background: var(--sand); display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; min-height: 160px; }

.loading-state { grid-column: 1 / -1; text-align: center; padding: 4rem 0; color: var(--text-muted); font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; }
.loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse 1.4s ease-in-out infinite; margin: 0 2px; }
.loading-dot:nth-child(2){animation-delay:0.2s} .loading-dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.empty-state { grid-column: 1 / -1; text-align: center; padding: 5rem 0; }
.empty-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; margin-bottom: 0.5rem; }
.empty-state p { color: var(--text-muted); font-size: 0.9rem; }

.pagination { display: flex; align-items: center; justify-content: center; gap: 0.4rem; padding: 2rem 0 4rem; border-top: 1px solid var(--sand); }
.page-btn { min-width: 40px; height: 40px; padding: 0 0.8rem; border: 1px solid var(--sand); background: transparent; color: var(--black); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.page-btn:hover { background: var(--teal); color: var(--white); border-color: var(--teal); }
.page-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.page-btn:disabled:hover { background: transparent; color: var(--black); border-color: var(--sand); }
.page-ellipsis { color: var(--text-muted); font-size: 0.8rem; padding: 0 0.3rem; }

footer { background: var(--black); color: var(--white); padding: 2rem 3rem; display: flex; align-items: center; justify-content: space-between; }
.footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; letter-spacing: 0.08em; }
.footer-copy { font-size: 0.72rem; letter-spacing: 0.08em; color: rgba(249,247,244,0.4); }

.card-featured, .card-regular { animation: cardIn 0.5s ease both; }
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.blog-grid > *:nth-child(1){animation-delay:0.05s} .blog-grid > *:nth-child(2){animation-delay:0.1s}
.blog-grid > *:nth-child(3){animation-delay:0.15s} .blog-grid > *:nth-child(4){animation-delay:0.2s}

@media(max-width:900px){
  nav{padding:1rem 1.5rem} .nav-links{display:none}
  .journal-header{padding:7rem 1.5rem 2rem;flex-direction:column;gap:1rem} .journal-tagline{text-align:left}
  .blog-main{padding:2rem 1.5rem} .blog-grid{grid-template-columns:1fr}
  .card-featured{grid-column:1;grid-template-columns:1fr;min-height:auto}
  .card-featured .card-img{aspect-ratio:16/9}
  .card-featured .card-body::before{top:0;left:0;width:100%;height:2px}
  footer{flex-direction:column;gap:0.5rem;text-align:center}
}
@media(min-width:901px) and (max-width:1100px){
  .blog-grid{grid-template-columns:repeat(2,1fr)}
  .card-featured{grid-template-columns:1fr;min-height:auto}
  .card-featured .card-img{aspect-ratio:16/7}
}
</style>
</head>
<body>

<nav id="navbar">
  <a href="index.html" class="nav-logo">Omi Bell</a>
  <ul class="nav-links">
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#services">Work With Me</a></li>
    <li><a href="blog.html" class="active">Blog</a></li>
    <li><a href="https://my.community.com/omibell" target="_blank">Community</a></li>
    <li><a href="index.html#media">Media</a></li>
    <li><a href="https://calendly.com/omitheintuitive/claritysession" target="_blank" class="nav-cta">Book a Session</a></li>
  </ul>
</nav>

<header class="journal-header">
  <div>
    <p class="journal-eyebrow">Omi Bell</p>
    <h1 class="journal-title">The <em>Journal</em></h1>
    <div class="journal-rule"></div>
  </div>
  <p class="journal-tagline">Thoughts on rest, performance, and the body as strategy.</p>
</header>

<main class="blog-main">
  <div class="blog-grid" id="blogGrid">
    <div class="loading-state">
      <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
    </div>
  </div>
  <div class="pagination" id="pagination" style="display:none;"></div>
</main>

<footer>
  <div class="footer-logo">Omi Bell</div>
  <div class="footer-copy">© 2025 Omi Bell · All rights reserved</div>
</footer>

<script>
const db = supabase.createClient(
  'https://mfevhwdtpftmlsksrgdi.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mZXZod2R0cGZ0bWxza3NyZ2RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzg1MTQsImV4cCI6MjA5MTg1NDUxNH0.tjWrwpoL24y2WhlkexWLHxYeHw_Yu9qfHM4Qj1VE6XA'
);

const POSTS_PER_PAGE = 10;
let allPosts = [];
let currentPage = 1;

async function loadPosts() {
  const grid = document.getElementById('blogGrid');
  try {
    const { data, error } = await db
      .from('posts').select('*')
      .eq('published', true)
      .order('date', { ascending: false });
    if (error) throw error;
    allPosts = data || [];
    renderPage(1);
  } catch(e) {
    grid.innerHTML = `<div class="empty-state"><h3>Could not load posts</h3><p>${e.message}</p></div>`;
  }
}

function formatDate(str) {
  if (!str) return '';
  return new Date(str).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function imgHtml(url, alt) {
  if (url) return `<img src="${url}" alt="${alt||''}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder></div>'">`;
  return `<div class="card-img-placeholder"></div>`;
}

function renderPage(page) {
  currentPage = page;
  const pagePosts = allPosts.slice((page-1)*POSTS_PER_PAGE, page*POSTS_PER_PAGE);
  const grid = document.getElementById('blogGrid');
  if (!pagePosts.length) {
    grid.innerHTML = `<div class="empty-state"><h3>No posts yet</h3><p>New writing will appear here soon.</p></div>`;
    document.getElementById('pagination').style.display = 'none';
    return;
  }
  grid.innerHTML = '';
  pagePosts.forEach((post, i) => grid.appendChild(i === 0 ? featuredCard(post) : regularCard(post)));
  renderPagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function featuredCard(p) {
  const a = document.createElement('a');
  a.className = 'card-featured'; a.href = `article.html?id=${p.id}`;
  a.innerHTML = `<div class="card-img">${imgHtml(p.cover_image, p.title)}</div>
    <div class="card-body">
      <p class="card-category">${p.category||'Journal'}</p>
      <h2 class="card-title">${p.title||''}</h2>
      <p class="card-excerpt">${p.excerpt||''}</p>
      <div class="card-meta">${formatDate(p.date)}</div>
    </div>`;
  return a;
}

function regularCard(p) {
  const a = document.createElement('a');
  a.className = 'card-regular'; a.href = `article.html?id=${p.id}`;
  a.innerHTML = `<div class="card-img">${imgHtml(p.cover_image, p.title)}</div>
    <div class="card-body">
      <p class="card-category">${p.category||'Journal'}</p>
      <h3 class="card-title">${p.title||''}</h3>
      <p class="card-excerpt">${p.excerpt||''}</p>
      <div class="card-meta">${formatDate(p.date)}</div>
    </div>`;
  return a;
}

function renderPagination() {
  const total = Math.ceil(allPosts.length / POSTS_PER_PAGE);
  const el = document.getElementById('pagination');
  if (total <= 1) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  let html = `<button class="page-btn" onclick="renderPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>`;
  for (let i = 1; i <= total; i++) {
    if (i===1||i===total||Math.abs(i-currentPage)<=1) html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="renderPage(${i})">${i}</button>`;
    else if (Math.abs(i-currentPage)===2) html += `<span class="page-ellipsis">…</span>`;
  }
  html += `<button class="page-btn" onclick="renderPage(${currentPage+1})" ${currentPage===total?'disabled':''}>Next →</button>`;
  el.innerHTML = html;
}

window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 30), { passive: true });
loadPosts();
</script>
</body>
</html>
